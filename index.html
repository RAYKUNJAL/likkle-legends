<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Likkle Legends Mail Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#FF6B35",    /* Sunset Coral - Action, Warmth, Energy */
              secondary: "#00B4D8",  /* Caribbean Azure - Trust, Adventure */
              accent: "#F72585",     /* Hibiscus Berry - Magic, Fun */
              deep: "#023047",       /* Midnight Navy - Authority, Quality (Text) */
              success: "#06D6A0",    /* Island Green - Growth, Safety */
              background: "#FFFDF7", /* Warm Sand - Organic, Premium Paper feel */
              text: "#023047",       /* Using Deep Navy for text instead of black */
              textLight: "#455A64"   /* Slate - Softer secondary text */
            },
            fontFamily: {
              sans: ['Open Sans', 'sans-serif'],
              heading: ['Poppins', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      /* Smooth scrolling for anchor links */
      html {
        scroll-behavior: smooth;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* CRO Animations */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes scaleUp {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }
      .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
      .animate-scale-up { animation: scaleUp 0.3s ease-out forwards; }
      .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
  <script type="importmap">

    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
