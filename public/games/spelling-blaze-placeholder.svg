<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#FFF8DC"/>

  <!-- Large flame shapes -->
  <path d="M80 250 Q70 180 80 120 Q90 80 100 60 Q95 140 90 200 Q85 240 80 250 Z" fill="url(#flameGradient)"/>
  <path d="M150 280 Q130 180 150 100 Q170 40 190 20 Q180 140 165 220 Q155 270 150 280 Z" fill="#FF8C42"/>
  <path d="M280 250 Q270 170 290 100 Q310 50 330 30 Q310 150 295 210 Q285 245 280 250 Z" fill="url(#flameGradient)"/>

  <!-- Flame highlights -->
  <circle cx="100" cy="100" r="15" fill="#FFD700" opacity="0.6"/>
  <circle cx="170" cy="80" r="20" fill="#FFFF00" opacity="0.5"/>
  <circle cx="310" cy="90" r="15" fill="#FFD700" opacity="0.6"/>

  <!-- Spark particles -->
  <circle cx="90" cy="60" r="3" fill="#FFD700"/>
  <circle cx="120" cy="50" r="2" fill="#FFA500"/>
  <circle cx="200" cy="30" r="3" fill="#FFD700"/>
  <circle cx="340" cy="40" r="2" fill="#FFA500"/>

  <!-- Text suggestion -->
  <text x="200" y="280" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    SPELL FAST!
  </text>
</svg>