<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="potGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="foodGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C92A2A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#FFF5E1"/>

  <!-- Table -->
  <rect x="40" y="200" width="320" height="100" fill="#D2691E" rx="5"/>

  <!-- Cooking pot -->
  <ellipse cx="100" cy="160" rx="50" ry="20" fill="url(#potGradient)"/>
  <path d="M50 160 Q50 130 100 120 Q150 130 150 160 Z" fill="url(#potGradient)" stroke="#654321" stroke-width="2"/>
  <path d="M50 160 L60 190 Q100 200 140 190 L150 160 Z" fill="#654321"/>

  <!-- Food ingredients -->
  <circle cx="200" cy="140" r="25" fill="#FF6B6B"/> <!-- Tomato -->
  <circle cx="260" cy="150" r="20" fill="#FFD700"/> <!-- Mango -->
  <rect x="300" y="130" width="40" height="50" fill="#8B4513" rx="3"/> <!-- Spice container -->
  <rect x="305" y="135" width="30" height="20" fill="#A0522D" rx="2"/>

  <!-- Utensils -->
  <line x1="180" y1="220" x2="180" y2="270" stroke="#8B4513" stroke-width="3"/>
  <ellipse cx="180" cy="275" rx="15" ry="5" fill="#8B4513"/> <!-- Spoon -->

  <!-- Ingredients on table -->
  <circle cx="250" cy="230" r="12" fill="#228B22"/> <!-- Cilantro/herbs -->
  <circle cx="280" cy="235" r="10" fill="#FFD700"/> <!-- Seasoning -->
  <circle cx="320" cy="225" r="14" fill="#FF8C00"/> <!-- Pumpkin/carrot -->

  <!-- Title -->
  <text x="200" y="280" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">
    COOK WITH TANTY!
  </text>
</svg>